<ion-content class="pagina-de-login">
  <div class="container">

    <h1 class="titulo">Crie sua conta<br>e compartilhe seu sabor!</h1>
    <p class="subtitulo">
      Descubra novas receitas, inspire outras pessoas e torne-se parte da nossa comunidade culinária.
    </p>

    <!-- Nome -->
    <ion-item class="item-de-entrada" lines="none">
      <ion-icon name="person-outline" slot="start"></ion-icon>
      <ion-input placeholder="Nome" type="text"></ion-input>
    </ion-item>

    <!-- Sobrenome -->
    <ion-item class="item-de-entrada" lines="none">
      <ion-icon name="person-outline" slot="start"></ion-icon>
      <ion-input placeholder="Sobrenome" type="text"></ion-input>
    </ion-item>

    <!-- Email -->
    <ion-item class="item-de-entrada" lines="none">
      <ion-icon name="mail-outline" slot="start"></ion-icon>
      <ion-input placeholder="Email" type="email"></ion-input>
    </ion-item>

    <!-- Senha -->
    <ion-item class="item-de-entrada" lines="none">
      <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
      <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="Senha"></ion-input>
      <ion-icon
        [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
        slot="end"
        (click)="togglePassword()"
        class="icone-alternar"
      ></ion-icon>
    </ion-item>

    <!-- Confirmar Senha -->
    <ion-item class="item-de-entrada" lines="none">
      <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
      <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="Confirmar Senha"></ion-input>
      <ion-icon
        [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
        slot="end"
        (click)="togglePassword()"
        class="icone-alternar"
      ></ion-icon>
    </ion-item>

    <!-- Botão de Cadastro -->
    <ion-button expand="block" class="botao-de-login">Cadastrar</ion-button>

    <!-- Divisor -->
    <div class="divisor"><span>Ou</span></div>

    <!-- Redes Sociais -->
    <div class="icones-sociais">
      <ion-button fill="clear" class="botao-social google">
        <ion-icon name="logo-google"></ion-icon>
      </ion-button>
      <ion-button fill="clear" class="botao-social facebook">
        <ion-icon name="logo-facebook"></ion-icon>
      </ion-button>
    </div>

    <!-- Link para login -->
    <div class="link-de-cadastro">
      <p>Já possui uma conta? <a href="#">Faça login.</a></p>
    </div>

  </div>
</ion-content>
