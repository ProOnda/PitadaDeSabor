<ion-content [fullscreen]="true" class="login-page">
  <div class="login-container">
    <div class="login-header">
      <h1>Junte-Se A Nós E Leve Mais Sabor Ao Mundo!</h1>
      <p>Bem-vindo de volta! Acesse sua conta para continuar explorando e aproveitando ao máximo tudo o que temos para oferecer.</p>
    </div>

    <app-custom-input label="Email">
      <i class="bi bi-envelope-fill"></i>
    </app-custom-input>

    <app-custom-input label="Senha">
      <i class="bi bi-lock-fill"></i>
    </app-custom-input>

    <div class="forgot-password">
      <a href="../forgot-password">Perdeu a Senha?</a>
    </div>

    <app-button [label]="'Log In'"></app-button>

    <div class="separator">
      <span>Ou</span>
    </div>

    <app-social-login></app-social-login>

    <app-footer-link></app-footer-link>
  </div>
</ion-content>
