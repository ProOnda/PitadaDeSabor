<ion-content [fullscreen]="true" class="password-reset-success-page">
  <div class="password-reset-success-container">
    <div class="password-reset-success-header">
      <h1>Senha Redefinida!</h1>
      <p>Sua senha foi redefinida com sucesso. Agora você pode fazer login com sua nova senha.</p>
    </div>

    <app-button label="Ir para o Login" (click)="goToLogin()"></app-button>
  </div>
</ion-content>
