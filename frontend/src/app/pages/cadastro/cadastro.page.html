<ion-content [fullscreen]="true" class="cadastro-page">
  <div class="cadastro-container">
    <div class="cadastro-header">
      <h1>Crie sua conta e junte-se à nossa comunidade!</h1>
      <p>Compartilhe suas experiências e descubra um mundo de sabores conosco.</p>
    </div>

    <form [formGroup]="cadastroForm" (ngSubmit)="cadastrarUsuario()">
      <app-custom-input label="Nome">
        <i class="bi bi-person-fill"></i>
      </app-custom-input>

      <app-custom-input label="Email">
        <i class="bi bi-envelope-fill"></i>
      </app-custom-input>

      <app-custom-input label="Senha">
        <i class="bi bi-lock-fill"></i>
      </app-custom-input>

      <app-custom-input label="Confirmar Senha">
        <i class="bi bi-lock-fill"></i>
      </app-custom-input>

      <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

      <app-button [label]="'Cadastrar'" type="submit"></app-button>
    </form>

    <div class="separator">
      <span>Ou</span>
    </div>

    <app-social-login></app-social-login>

    <app-footer-link [isLoginPage]="false"></app-footer-link>
  </div>
</ion-content>
