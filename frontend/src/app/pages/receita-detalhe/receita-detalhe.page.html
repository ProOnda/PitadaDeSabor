<div class="receita-detalhe">
  <div class="content">
    <div class="page-header">
      <app-page-header
        title="Detalhes Da Receita"
        [showBackButton]="true"
        backButtonRoute="/feed"
      ></app-page-header>
    </div>

    <div class="recipe-image-container">
      <img src="{{ receita?.url_foto }}" alt="{{ receita?.nome_receita }}">
    </div>

    <div class="recipe-details">

      <div class="recipe-header">
        <h2>{{ receita?.nome_receita }}</h2>
      </div>

      <div class="description" *ngIf="receita?.descricao">
        <h3>Descrição</h3>
        <p>{{ receita?.descricao }}</p>
      </div>

      <div class="specifications">
        <app-info-item iconClass="bi bi-clock" text="{{ receita?.tempo_preparo }}"></app-info-item>
        <app-info-item iconClass="bi-graph-up" text="{{ receita?.dificuldade_receita }}"></app-info-item>
        <app-info-item iconClass="bi bi-bookmark" text="{{ receita?.categoria }}"></app-info-item>
      </div>
    </div>
  </div>
</div>
