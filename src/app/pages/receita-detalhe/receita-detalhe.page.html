<div class="receita-detalhe" *ngIf="receita$ | async as receita; else loading">
  <div class="content">
    <div class="page-header">
      <app-page-header
        title="Detalhes Da Receita"
        [showBackButton]="true"
        backButtonRoute="/feed"
      ></app-page-header>
    </div>

    <div class="recipe-image-container">
      <img src="{{ receita?.photo}}" alt="{{ receita?.recipe_name }}">
    </div>

    <div class="recipe-details">
      <div class="recipe-header">
        <h2>{{ receita?.recipe_name }}</h2>
      </div>

      <div class="description" *ngIf="receita?.description">
        <h3>Descrição</h3>
        <p>{{ receita?.description}}</p>
      </div>

      <div class="specifications">
        <app-info-item iconClass="bi bi-clock" text="{{ receita?.timeName }}"></app-info-item>
        <app-info-item iconClass="bi bi-graph-up" text="{{ receita?.difficultyName }}"></app-info-item>
        <app-info-item iconClass="bi bi-bookmark" text="{{ receita?.categoryName }}"></app-info-item>
      </div>
    </div>
  </div>
</div>

<ng-template #loading>
  <div class="loading-spinner">
    <ion-spinner color="primary"></ion-spinner>
    <p>Carregando detalhes da receita...</p>
  </div>
</ng-template>
