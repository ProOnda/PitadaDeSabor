<ion-content [fullscreen]="true" class="profile-page">
  <div class="container">
    <div class="page-header-container-custom">
      <app-page-header
        title="Perfil"
        [showBackButton]="true"
        backButtonRoute="/feed"
      ></app-page-header>
    </div>

    <div class="profile-content">
      <div class="user-profile-section">
        <div class="profile-picture-container">
          <img src="https://placehold.co/100x100" alt="Foto de Perfil" class="profile-picture">
        </div>
        <h3 class="user-name">{{ userName || 'Carregando...' }}</h3>
        <p class="posts-count">{{ postsCount || 0 }} postagens feitas</p>
      </div>

      <h4 class="section-title">Minhas Receitas</h4>

      <p *ngIf="isLoading" class="loading-message">Carregando suas receitas...</p>
      <p *ngIf="error" class="error-message">{{ error }}</p>

      <ng-container *ngIf="userRecipes$ | async as recipes">
        <div *ngIf="!isLoading && recipes.length > 0" class="recipes-grid">
          <div *ngFor="let recipe of recipes" class="recipe-card">
            <div class="recipe-image-container">
              <img [src]="recipe.photoUrl || 'https://placehold.co/311x229'" alt="{{ recipe.recipeName }}" class="recipe-image">
            </div>
            <div class="recipe-info">
              <h5 class="recipe-title">{{ recipe.recipeName }}</h5>
              <p class="recipe-meta">{{ recipe.createdAt | date:'mediumDate' }} • {{ recipe.readTime }} min read</p>
            </div>
          </div>
        </div>
        <p *ngIf="!isLoading && !error && recipes.length === 0" class="no-recipes-message">
          Você ainda não criou nenhuma receita. Que tal compartilhar uma?
        </p>
      </ng-container>
    </div>
  </div>
</ion-content>
