// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Atualize para a versão mais recente do plugin Android Gradle
        classpath 'com.android.tools.build:gradle:8.1.1'  // Versão estável atual (ou ajuste para a sua necessidade)
        
        // Google Services para Firebase - versão mais recente estável
        classpath 'com.google.gms:google-services:4.3.15'
        
        // Se for usar Kotlin, incluir também o plugin Kotlin Gradle (opcional)
        // classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
